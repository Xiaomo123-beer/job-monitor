services:
  job-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-monitor
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Database - stored in persistent volume
      - DATABASE_URL=file:/app/data/dev.db
      # AI: OpenAI or DeepSeek (user configures in-app)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # Email notifications (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Puppeteer
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_SKIP_DOWNLOAD=true
    volumes:
      # Persistent storage for SQLite database
      - job-monitor-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Resource limits for Puppeteer
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  job-monitor-data:
    driver: local
