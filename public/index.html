<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7c3aed" />
  <title>岗位监测助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a1a2e;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .section {
      text-align: left;
      margin-bottom: 20px;
    }
    .section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }
    .section input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .section input:focus {
      border-color: #7c3aed;
    }
    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      opacity: 0.5;
    }
    .status {
      font-size: 12px;
      margin-top: 12px;
      min-height: 18px;
    }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
    .links {
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
    }
    .links a {
      color: #7c3aed;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#x1F4BC;</div>
    <h1>岗位监测助手</h1>
    <p class="subtitle">AI 驱动的招聘岗位自动监测与推送</p>

    <div id="setup-screen">
      <div class="section">
        <label>后端服务器地址</label>
        <input
          type="url"
          id="server-url"
          placeholder="https://your-app.vercel.app"
          autocomplete="url"
        />
        <p class="hint">部署 Next.js 后端后，在此填写服务器地址</p>
      </div>

      <div class="section">
        <label>DeepSeek API Key <span style="color:#9ca3af;font-weight:400;">(可选)</span></label>
        <input
          type="password"
          id="api-key"
          placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx"
          autocomplete="off"
        />
        <p class="hint">用于 AI 语义岗位匹配，可后续在设置中修改</p>
      </div>

      <button id="connect-btn" onclick="connect()">连接并启动</button>
      <div class="status" id="status"></div>
    </div>

    <div id="loading-screen" style="display:none;">
      <p style="margin-bottom:12px;">&#x1F504; 正在连接到服务器...</p>
      <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <p class="links">
      <a href="#" onclick="toggleSetup()">重新配置服务器地址</a>
    </p>
  </div>

  <script>
    const STORAGE_KEY_URL = 'api-base-url';
    const STORAGE_KEY_KEY = 'deepseek-api-key';
    const SETTINGS_KEY = 'app-configured';

    // Auto-connect if already configured
    window.addEventListener('DOMContentLoaded', () => {
      const savedUrl = localStorage.getItem(STORAGE_KEY_URL);
      const configured = localStorage.getItem(SETTINGS_KEY);

      if (savedUrl && configured === 'true') {
        // Already configured, go straight to the app
        window.location.href = savedUrl;
        return;
      }

      // Pre-fill saved values
      if (savedUrl) {
        document.getElementById('server-url').value = savedUrl;
      }
      const savedKey = localStorage.getItem(STORAGE_KEY_KEY);
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
      }

      document.getElementById('setup-screen').style.display = 'block';
    });

    async function connect() {
      const urlInput = document.getElementById('server-url');
      const apiKeyInput = document.getElementById('api-key');
      const statusEl = document.getElementById('status');
      const btn = document.getElementById('connect-btn');

      let url = urlInput.value.trim();

      if (!url) {
        statusEl.textContent = '请输入后端服务器地址';
        statusEl.className = 'status error';
        return;
      }

      // Normalize URL
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      url = url.replace(/\/$/, '');

      // Save to localStorage
      localStorage.setItem(STORAGE_KEY_URL, url);

      if (apiKeyInput.value.trim()) {
        localStorage.setItem(STORAGE_KEY_KEY, apiKeyInput.value.trim());
      }

      // Show loading
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'block';
      statusEl.textContent = '';
      statusEl.className = 'status';

      // Test connection
      try {
        const res = await fetch(url + '/api/stats');
        if (res.ok) {
          statusEl.textContent = '连接成功！正在跳转...';
          statusEl.className = 'status success';
          localStorage.setItem(SETTINGS_KEY, 'true');

          // Send API key to server if provided
          if (apiKeyInput.value.trim()) {
            try {
              await fetch(url + '/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  openaiApiKey: apiKeyInput.value.trim(),
                  aiProvider: 'deepseek',
                  aiModel: 'deepseek-chat',
                }),
              });
            } catch (e) {
              // Settings save failed, continue anyway
            }
          }

          setTimeout(() => {
            window.location.href = url;
          }, 800);
        } else {
          throw new Error('Server responded with status ' + res.status);
        }
      } catch (err) {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('loading-screen').style.display = 'none';
        statusEl.textContent = '无法连接到服务器: ' + err.message;
        statusEl.className = 'status error';
        btn.disabled = false;
      }
    }

    function toggleSetup() {
      localStorage.removeItem(SETTINGS_KEY);
      document.getElementById('setup-screen').style.display = 'block';
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = 'status';
    }
  </script>
</body>
</html>
